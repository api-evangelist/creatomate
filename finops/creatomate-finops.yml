meters:
- name: image_credits
  description: Credits consumed by image renders, one credit per image.
  unit: credits
  aggregation: sum
  dimensions:
  - project
  - template
- name: video_credits
  description: Credits consumed by video renders; about 14 credits per minute of 720p 25fps, scaling with resolution, frame rate, and length.
  unit: credits
  aggregation: sum
  dimensions:
  - project
  - template
- name: storage_gigabytes
  description: Stored output and asset gigabytes against the plan storage allowance.
  unit: gigabytes
  aggregation: max
  dimensions:
  - project
- name: feed_rows
  description: Data feed rows used for spreadsheet/bulk generation against the plan allowance.
  unit: rows
  aggregation: sum
  dimensions:
  - project
principles:
- name: Visibility
  description: Track credit burn per template and per project; watch monthly credit pool consumption against the plan allowance.
- name: Allocation
  description: Tag renders with metadata and use template tags to attribute credit spend to workloads, campaigns, or cost centers.
- name: Optimization
  description: Right-size output with render_scale, max_width/max_height, and frame_rate; cap video length; prefer images (1 credit) where motion is not required.
- name: Accountability
  description: Match the subscription tier to expected monthly render volume; review credit usage before each renewal and avoid overage by upgrading temporarily only when needed.
