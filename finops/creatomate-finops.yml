description: >-
  FinOps view of Creatomate spend. Creatomate bills via monthly subscription
  tiers that bundle a pool of rendering credits, storage, and feed rows. Cost
  is driven by credit consumption per rendered output: one image is one credit,
  and roughly fourteen credits per minute of 720p (25 fps) video, scaling with
  resolution, frame rate, and length. Optimization centers on right-sizing
  output dimensions, frame rate, and length, and on matching the plan tier to
  monthly render volume.
notes: >-
  Per-plan dollar amounts render dynamically on the pricing page and vary by
  billing cycle; verify during reconciliation. Credit-per-output rates are as
  published.
